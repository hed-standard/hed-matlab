---
name: Lychee link checker

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 3 AM UTC to catch broken links
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  link-checker:
    name: Lychee link checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.10'
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create virtual environment
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install -e ".[docs]"

      - name: Patch sphinxcontrib-matlabdomain
        run: python docs/patch_matlabdomain.py

      - name: Configure Git for GitHub Pages
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Build documentation
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Link Checker on built documentation
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          # Check the built HTML files recursively (includes internal links)
          args: --config lychee.toml --verbose --no-progress --max-redirects 10 'docs/_build/html/**/*.html' README.md
          fail: true
