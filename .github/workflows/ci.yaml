name: MATLAB CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.event.pull_request.base.ref || github.ref_name }}

jobs:
  matlab-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@a0180c939fb1a28de13f44f7b778b912384ced1f # v3

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hedtools

      - name: Run MATLAB tests
        uses: matlab-actions/run-command@bcd446a219949c24051c1d04a4b4e0274c42f23b # v3
        with:
          command: |
            addpath(genpath("hedmat")), addpath(genpath("tests")), run_tests